<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DashboardAI</title>

  <!-- GridStack -->
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@7/dist/gridstack.min.css" />
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@7/dist/gridstack-extra.min.css" />

  <!-- Leaflet -->
  <link  rel="stylesheet" hrefDF="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App styles -->
  <link  rel="stylesheet" href="https://beta.whsmonitor.com.au/dashboardv2/css/dashboard.css?ver=11111" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Chat sidebar collapse overrides (remote engine uses .hidden; we restyle it as a 36px strip) -->
  <style>
    .chat-sidebar.hidden {
      display: flex !important; /* override .hidden { display: none !important } from remote CSS */
      width: 36px !important;
      min-width: 36px !important;
      border-left: 1px solid var(--color-border) !important;
      overflow: hidden;
    }
    .chat-sidebar.hidden .chat-header,
    .chat-sidebar.hidden .chat-messages,
    .chat-sidebar.hidden .chat-input-area {
      opacity: 0;
      pointer-events: none;
    }
    .chat-sidebar.hidden .chat-expand-btn {
      display: flex !important;
    }
  </style>
</head>
<body class="dashboard-page">

  <!-- ── Top Bar ─────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <a href="/" class="topbar-logo">
	
	 <span class="d-none topbar-title" style="display: none !important" id="dashboardTitle">Loading…</span>
	<img src="https://whsmonitor.com.au/wp-content/themes/whs-monitor/assets/images/WHSLogo_Blue.png" />
    </a>
    <div class="topbar-actions">
      <button id="toggleChatBtn" class="btn-icon" title="Toggle chat"><i class="ph ph-chat-circle-dots"></i></button>
    </div>
  </header>

  <!-- ── Main Layout ────────────────────────────────────────────────────── -->
  <div class="main-layout">

    <!-- Filter Sidebar -->
    <aside class="filter-sidebar collapsed" id="filterSidebar">
      <div class="filter-sidebar-header">
        <span class="filter-sidebar-title">Filters</span>
        <div class="filter-sidebar-actions">
          <a href="#" class="filter-clear-all" id="filterClearAll">Clear All</a>
          <button class="filter-toggle-btn" id="filterToggleBtn" title="Collapse filters"><i class="ph ph-caret-left"></i></button>
        </div>
      </div>
      <div id="filterBar" class="filter-bar"></div>
      <button class="filter-expand-btn" id="filterExpandBtn" title="Expand filters"><i class="ph ph-caret-right"></i></button>
    </aside>

    <!-- Dashboard canvas -->
    <main class="canvas-area" id="canvasArea">
      <div class="grid-stack" id="gridContainer"></div>
    </main>

    <!-- Chat sidebar -->
    <aside class="chat-sidebar" id="chatSidebar">
      <button class="chat-expand-btn" id="chatExpandBtn" title="Expand chat"><i class="ph ph-caret-left"></i></button>
      <div class="chat-header">
        <span>AI Assistant</span>
        <button class="chat-toggle-btn btn-icon" id="closeChatBtn" title="Collapse"><i class="ph ph-caret-right"></i></button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-bubble assistant">
          Hi! I can modify this dashboard for you. Try:
          <ul>
            <li>"Add a hazard report for sales by location"</li>
            <li>"Show hazard report for last quarter"</li>
            <li>"Remove the table widget"</li>
            <li>"Add a date range filter"</li>
          </ul>
        </div>
      </div>
      <form class="chat-input-area" id="chatForm">
        <textarea id="chatInput" placeholder="Ask me to change the dashboard…" rows="2"></textarea>
        <button type="submit" id="chatSendBtn">Send</button>
      </form>
    </aside>
  </div>

  <!-- ── Scripts ─────────────────────────────────────────────────────────── -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gridstack@7/dist/gridstack-all.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/kpi-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/chart-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/table-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/map-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/markdown-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/gauge-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/stat-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/progress-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/donut-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/heatmap-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/dashboard-engine.js?ver=1"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/chat.js?ver=1"></script>

  <script>
    // Bootstrap: extract dashboard ID from URL path /dashboard/{id}
    const pathParts    = window.location.pathname.split('/');
    const dashboardId  = pathParts[pathParts.length - 1];

    // Read session from URL query string (set by the generate redirect)
    const _qs      = new URLSearchParams(window.location.search);
    const SESSION  = {
      userId:  _qs.get('userId')  || 'user_001',
      storeId: parseInt(_qs.get('storeId') || '1', 10)
    };

    DashboardEngine.init(dashboardId, SESSION);
    ChatManager.init(SESSION);

    // Filter sidebar collapse toggle
    document.getElementById('filterToggleBtn').addEventListener('click', () => {
      document.getElementById('filterSidebar').classList.add('collapsed');
    });
    document.getElementById('filterExpandBtn').addEventListener('click', () => {
      document.getElementById('filterSidebar').classList.remove('collapsed');
    });

    // Chat expand button — remote engine owns closeChatBtn & toggleChatBtn (they add/toggle .hidden)
    // We only need to handle the expand button to remove .hidden
    document.getElementById('chatExpandBtn').addEventListener('click', () => {
      document.getElementById('chatSidebar').classList.remove('hidden');
    });
  </script>
</body>
</html>
