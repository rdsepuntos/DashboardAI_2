<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DashboardAI</title>

  <!-- GridStack -->
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@7/dist/gridstack.min.css" />
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@7/dist/gridstack-extra.min.css" />

  <!-- Leaflet -->
  <link  rel="stylesheet" hrefDF="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App styles -->
  <link  rel="stylesheet" href="https://beta.whsmonitor.com.au/dashboardv2/css/dashboard.css?ver=11111" />

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Chat sidebar collapse overrides (remote engine uses .hidden; we restyle it as a 36px strip) -->
  <style>
    .chat-sidebar.hidden {
      display: flex !important; /* override .hidden { display: none !important } from remote CSS */
      width: 36px !important;
      min-width: 36px !important;
      border-left: 1px solid var(--color-border) !important;
      overflow: hidden;
    }
    .chat-sidebar.hidden .chat-header,
    .chat-sidebar.hidden .chat-messages,
    .chat-sidebar.hidden .chat-input-area {
      opacity: 0;
      pointer-events: none;
    }
    .chat-sidebar.hidden .chat-expand-btn {
      display: flex !important;
    }
  </style>
</head>
<body class="dashboard-page">

  <!-- ── Top Bar ─────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <a href="/" class="topbar-logo">
	
	 <span class="d-none topbar-title" style="display: none !important" id="dashboardTitle">Loading…</span>
	<img src="https://whsmonitor.com.au/wp-content/themes/whs-monitor/assets/images/WHSLogo_Blue.png" />
    </a>
    <div class="topbar-actions">
      <button onclick="generatePDF()" class="btn-icon" title="Generate Report" style="margin-right:4px"><i class="ph ph-file-text"></i></button>
      <button onclick="generatePDF(true)" class="btn-icon" title="Generate AI Report (with insights)" style="margin-right:4px"><i class="ph ph-sparkle"></i></button>
      <button id="toggleChatBtn" class="btn-icon" title="Toggle chat"><i class="ph ph-chat-circle-dots"></i></button>
    </div>
  </header>

  <!-- ── Main Layout ────────────────────────────────────────────────────── -->
  <div class="main-layout">

    <!-- Filter Sidebar -->
    <aside class="filter-sidebar collapsed" id="filterSidebar">
      <div class="filter-sidebar-header">
        <span class="filter-sidebar-title">Filters</span>
        <div class="filter-sidebar-actions">
          <a href="#" class="filter-clear-all" id="filterClearAll">Clear All</a>
          <button class="filter-toggle-btn" id="filterToggleBtn" title="Collapse filters"><i class="ph ph-caret-left"></i></button>
        </div>
      </div>
      <div id="filterBar" class="filter-bar"></div>
      <button class="filter-expand-btn" id="filterExpandBtn" title="Expand filters"><i class="ph ph-caret-right"></i></button>
    </aside>

    <!-- Dashboard canvas -->
    <main class="canvas-area" id="canvasArea">
      <div class="grid-stack" id="gridContainer"></div>
    </main>

    <!-- Chat sidebar -->
    <aside class="chat-sidebar" id="chatSidebar">
      <button class="chat-expand-btn" id="chatExpandBtn" title="Expand chat"><i class="ph ph-caret-left"></i></button>
      <div class="chat-header">
        <span>AI Assistant</span>
        <button class="chat-toggle-btn btn-icon" id="closeChatBtn" title="Collapse"><i class="ph ph-caret-right"></i></button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-bubble assistant">
          Hi! I can modify this dashboard for you. Try:
          <ul>
            <li>"Add a hazard report for sales by location"</li>
            <li>"Show hazard report for last quarter"</li>
            <li>"Remove the table widget"</li>
            <li>"Add a date range filter"</li>
          </ul>
        </div>
      </div>
      <form class="chat-input-area" id="chatForm">
        <textarea id="chatInput" placeholder="Ask me to change the dashboard…" rows="2"></textarea>
        <button type="submit" id="chatSendBtn">Send</button>
      </form>
    </aside>
  </div>

  <!-- ── Scripts ─────────────────────────────────────────────────────────── -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gridstack@7/dist/gridstack-all.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/kpi-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/chart-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/table-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/map-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/markdown-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/gauge-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/stat-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/progress-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/donut-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/widgets/heatmap-widget.js"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/dashboard-engine.js?ver=1"></script>
  <script src="https://beta.whsmonitor.com.au/dashboardv2/js/chat.js?ver=1"></script>

  <!-- jsPDF + AutoTable + html2canvas for visual PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    // Bootstrap: extract dashboard ID from URL path /dashboard/{id}
    const pathParts    = window.location.pathname.split('/');
    const dashboardId  = pathParts[pathParts.length - 1];

    // Read session from URL query string (set by the generate redirect)
    const _qs      = new URLSearchParams(window.location.search);
    const SESSION  = {
      userId:  _qs.get('userId')  || 'user_001',
      storeId: parseInt(_qs.get('storeId') || '1', 10)
    };

    DashboardEngine.init(dashboardId, SESSION);
    ChatManager.init(SESSION);

    async function generatePDF(aiMode = false) {
      const btn = document.querySelector('[onclick="generatePDF()"]');
      if (btn) btn.disabled = true;

      // ── Progress overlay ────────────────────────────────────────────────────
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:Segoe UI,Arial,sans-serif;backdrop-filter:blur(3px)';
      overlay.innerHTML = `<div style="background:#1e3a8a;border-radius:12px;padding:30px 44px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.5);min-width:280px">
        <div style="color:#fff;font-size:15px;font-weight:700;letter-spacing:.03em;margin-bottom:6px">Preparing Report</div>
        <div id="__pdf_prog" style="color:rgba(255,255,255,.72);font-size:11px;margin-bottom:16px">Preparing…</div>
        <div style="height:5px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden">
          <div id="__pdf_bar" style="height:100%;width:0%;background:#60a5fa;border-radius:3px;transition:width .35s ease"></div>
        </div>
      </div>`;
      document.body.appendChild(overlay);
      const setProg = (msg, pct) => {
        const m = document.getElementById('__pdf_prog'); if (m) m.textContent = msg;
        const b = document.getElementById('__pdf_bar');  if (b) b.style.width = pct + '%';
      };

      try {
        if (!window.html2canvas) throw new Error('html2canvas not loaded — please refresh.');

        const dashboard  = DashboardEngine.getDashboard();
        const rawTitle   = (dashboard?.title || '').replace(/^Store\s+\d+\s*[-–—]?\s*/i, '').trim();
        const printTitle = rawTitle || 'Dashboard Report';
        const printDate  = new Date().toLocaleDateString('en-AU', { day: '2-digit', month: 'long', year: 'numeric' });
        const storeLabel = (typeof SESSION !== 'undefined' && SESSION.storeId) ? `Store ID ${SESSION.storeId}` : '';

        // HTML-escape helper — prevents XSS when injecting dynamic content into HTML
        const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        // ── Collect non-table widgets ──────────────────────────────────────────
        setProg('Collecting widgets…', 5);
        const gridItems = [...document.querySelectorAll('#gridContainer .grid-stack-item')]
          .map(el => ({
            content: el.querySelector('.grid-stack-item-content'),
            type:    el.dataset.type || '',
            title:   el.querySelector('.widget-header h3, .widget-title')?.textContent?.trim() || '',
            gsW: parseInt(el.getAttribute('gs-w') || '6', 10),
            gsH: parseInt(el.getAttribute('gs-h') || '2', 10),
            gsX: parseInt(el.getAttribute('gs-x') || '0', 10),
            gsY: parseInt(el.getAttribute('gs-y') || '0', 10),
          }))
          .filter(i => i.content && i.type !== 'table')
          .sort((a, b) => a.gsY !== b.gsY ? a.gsY - b.gsY : a.gsX - b.gsX);

        // ── Fetch table data ───────────────────────────────────────────────────
        setProg('Fetching table data…', 10);
        let allData = null;
        if (DashboardEngine.getAllWidgetDataForPrint) {
          allData = await DashboardEngine.getAllWidgetDataForPrint();
        }
        const tableWidgets = allData ? allData.filter(d => d.type === 'table') : [];

        // ── AI descriptions (aiMode only) ─────────────────────────────────────
        let descriptions = {};
        if (aiMode) {
          try {
            setProg('Generating AI insights…', 12);
            const allForDesc = [
              ...gridItems.map(i => {
                const valEl = i.content.querySelector('.kpi-value,.stat-value,.metric-value,[class*="kpi-val"],[class*="stat-val"],.big-number');
                return { title: i.title, type: i.type, chartType: i.content.dataset?.chartType || '', currentValue: valEl?.textContent?.trim() || '' };
              }),
              ...tableWidgets.map(({ widget }) => ({ title: widget.title || 'Table Data', type: 'table', chartType: '', currentValue: '' }))
            ];
            const res = await fetch('https://beta.whsmonitor.com.au/dashboardv2/api/chat/describe', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ dashboardTitle: printTitle, userId: SESSION.userId, storeId: SESSION.storeId, widgets: allForDesc })
            });
            if (res.ok) { const d = await res.json(); descriptions = d.descriptions || {}; }
          } catch (e) { console.warn('[AI Report] Description fetch failed:', e); }
        }
        // Case-insensitive lookup — API now returns {description, layout} objects per widget
        const getInsight = title => {
          if (!title) return { description: '', layout: 'full' };
          let raw = descriptions[title];
          if (!raw) {
            const lower = title.toLowerCase();
            const k = Object.keys(descriptions).find(k => k.toLowerCase() === lower);
            raw = k ? descriptions[k] : null;
          }
          if (!raw) return { description: '', layout: 'full' };
          // Backward-compat: handle plain strings from older API responses
          if (typeof raw === 'string') return { description: raw, layout: 'full' };
          return { description: raw.description || '', layout: raw.layout || 'full' };
        };

        // ── Separate KPI/stat from chart widgets ───────────────────────────────
        const COLORS     = ['', 'teal', 'indigo', 'amber'];
        const kpiItems   = gridItems.filter(i => i.type === 'kpi' || i.type === 'stat');
        const chartItems = gridItems.filter(i => i.type !== 'kpi' && i.type !== 'stat');

        // KPI mini strip — first ≤4 KPI/stat widgets
        let kpiStripHtml = '';
        kpiItems.slice(0, 4).forEach((item, idx) => {
          const body     = item.content;
          const valEl    = body.querySelector('.kpi-value,.stat-value,.metric-value,[class*="kpi-val"],[class*="stat-val"],.big-number');
          const lblEl    = body.querySelector('.kpi-label,.stat-label,.kpi-subtitle,[class*="kpi-lbl"],[class*="stat-lbl"]');
          const trendEl  = body.querySelector('.kpi-trend,.stat-trend,[class*="trend"]');
          const val      = esc(valEl?.textContent?.trim()   || '—');
          const lbl      = esc(lblEl?.textContent?.trim()   || item.title);
          const trendRaw = trendEl?.textContent?.trim() || '';
          const isDown   = /▼|down|decr|-\d/i.test(trendRaw);
          const trend    = esc(trendRaw);
          const cc       = COLORS[idx % COLORS.length];
          kpiStripHtml  += `<div class="kpi-mini${cc ? ' '+cc : ''}">
            <div class="kpi-mini-val">${val}</div>
            <div class="kpi-mini-lbl">${lbl}</div>
            ${trend ? `<div class="kpi-mini-trend${isDown ? ' down' : ''}">${trend}</div>` : ''}
          </div>`;
        });

        // Chart cards (screenshots) + KPI overflow cards
        let cardsHtml = '';
        let cIdx = 0;
        let lastSideLayout = null; // track last "right"/"left" to force alternation
        for (let i = 0; i < chartItems.length; i++) {
          const item = chartItems[i];
          setProg(`Capturing widget ${i+1} of ${chartItems.length}…`, 20 + Math.round(((i+1) / Math.max(chartItems.length, 1)) * 55));
          const canvas = await html2canvas(item.content, {
            scale: 3, useCORS: true, allowTaint: true, backgroundColor: '#ffffff', logging: false
          });
          const img      = canvas.toDataURL('image/png');
          const cc       = COLORS[cIdx % COLORS.length];
          const spanFull = item.gsW >= 10 ? ' style="grid-column:1/-1"' : '';
          const insight = aiMode ? getInsight(item.title) : null;
          let layout    = aiMode ? (insight?.layout || 'full') : 'full';
          // Alternate right/left if AI picks the same side twice in a row
          if (layout === 'right' || layout === 'left') {
            if (layout === lastSideLayout) layout = layout === 'right' ? 'left' : 'right';
            lastSideLayout = layout;
          }
          if (layout === 'right') {
            cardsHtml += `<div class="wc${cc ? ' '+cc : ''}" style="grid-column:1/-1">
              <div class="wc-head"><span class="wc-head-title">${esc(item.title) || 'Widget'}</span></div>
              <div class="wc-body-right">
                <div class="wc-img"><img src="${img}" style="width:100%;display:block" /></div>
                <div class="wc-aside"><p>${esc(insight.description)}</p></div>
              </div>
            </div>`;
          } else if (layout === 'left') {
            cardsHtml += `<div class="wc${cc ? ' '+cc : ''}" style="grid-column:1/-1">
              <div class="wc-head"><span class="wc-head-title">${esc(item.title) || 'Widget'}</span></div>
              <div class="wc-body-left">
                <div class="wc-aside"><p>${esc(insight.description)}</p></div>
                <div class="wc-img"><img src="${img}" style="width:100%;display:block" /></div>
              </div>
            </div>`;
          } else if (layout === 'bottom' && insight?.description) {
            cardsHtml += `<div class="wc${cc ? ' '+cc : ''}"${spanFull}>
              <div class="wc-head"><span class="wc-head-title">${esc(item.title) || 'Widget'}</span></div>
              <div class="wc-body-bottom">
                <div class="wc-img"><img src="${img}" style="width:100%;display:block" /></div>
                <div class="wc-note">${esc(insight.description)}</div>
              </div>
            </div>`;
          } else {
            cardsHtml += `<div class="wc${cc ? ' '+cc : ''}"${spanFull}>
              <div class="wc-head"><span class="wc-head-title">${esc(item.title) || 'Widget'}</span></div>
              <div class="wc-body-bottom">
                <div class="wc-img"><img src="${img}" style="width:100%;display:block" /></div>
              </div>
            </div>`;
          }
          cIdx++;
        }
        kpiItems.slice(4).forEach(item => {
          const body     = item.content;
          const valEl    = body.querySelector('.kpi-value,.stat-value,.metric-value,[class*="kpi-val"],[class*="stat-val"],.big-number');
          const lblEl    = body.querySelector('.kpi-label,.stat-label,.kpi-subtitle,[class*="kpi-lbl"],[class*="stat-lbl"]');
          const trendEl  = body.querySelector('.kpi-trend,.stat-trend,[class*="trend"]');
          const val      = esc(valEl?.textContent?.trim()   || '—');
          const lbl      = esc(lblEl?.textContent?.trim()   || item.title);
          const trendRaw = trendEl?.textContent?.trim() || '';
          const isDown   = /▼|down|decr|-\d/i.test(trendRaw);
          const trend    = esc(trendRaw);
          const cc       = COLORS[cIdx % COLORS.length];
          cardsHtml += `<div class="wc${cc ? ' '+cc : ''}">
            <div class="wc-head"><span class="wc-head-title">${esc(item.title) || 'KPI'}</span></div>
            <div class="widget-card-body">
              <div class="kpi-value">${val}</div>
              ${lbl ? `<div class="kpi-label">${lbl}</div>` : ''}
              ${trend ? `<div class="kpi-trend${isDown ? ' down' : ''}">${trend}</div>` : ''}
            </div>
          </div>`;
          cIdx++;
        });

        // ── Table pages ────────────────────────────────────────────────────────
        const fmtCell = v => {
          if (v === null || v === undefined) return '-';
          const s = String(v).trim();
          if (/^\d{4}-\d{2}-\d{2}([ T]|$)/.test(s)) {
            const d = new Date(s);
            if (!isNaN(d.getTime()))
              return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
          }
          return esc(s);
        };
        const fmtHdr     = c => esc(c.replace(/([A-Z])/g, ' $1').replace(/_/g, ' ').trim());
        const badgeClass = v => {
          const s = String(v).toLowerCase();
          if (/\bopen\b|high|fail|\bdanger\b|critical|reject/.test(s)) return 'red';
          if (/clos|done|complet|pass|resolv|approv/.test(s))          return 'green';
          if (/review|pending|\bprogress\b|medium|warn/.test(s))       return 'amber';
          return '';
        };

        let tablePagesHtml = '';
        tableWidgets.forEach(({ widget, data, error }) => {
          let bodyHtml;
          if (error || !data || !data.length) {
            bodyHtml = `<div style="padding:20px 28px;color:#6b7280;font-size:11px">${error ? 'Error: '+esc(String(error)) : 'No data available'}</div>`;
          } else {
            const cfg  = widget.config || {};
            const cols = cfg.columns ? cfg.columns.split(',').map(c => c.trim()).filter(Boolean) : Object.keys(data[0]);
            const rows = data.map(row => `<tr>${cols.map(c => {
              const raw = fmtCell(row[c]);
              const bc  = badgeClass(raw);
              return `<td>${bc ? `<span class="badge ${bc}">${raw}</span>` : raw}</td>`;
            }).join('')}</tr>`).join('');
            bodyHtml = `<div class="data-table-wrap"><table class="data-table">
              <thead><tr>${cols.map(c => `<th>${fmtHdr(c)}</th>`).join('')}</tr></thead>
              <tbody>${rows}</tbody>
            </table></div>`;
          }
          const tableNote = aiMode && getInsight(widget.title || 'Table Data').description ? `<div class="table-insight"><div class="table-insight-text">${esc(getInsight(widget.title || 'Table Data').description)}</div></div>` : '';
          tablePagesHtml += `<div class="page">
            <div class="table-banner">
              <span class="tit">&#128203; ${esc(widget.title || 'Table Data')}</span>
              ${data && data.length ? `<span class="cnt">${data.length} records &middot; ${printDate}</span>` : ''}
            </div>
            ${tableNote}
            ${bodyHtml}
            <div class="page-footer">
              <span class="doc-title">${esc(printTitle)}</span>
              <span class="pg">Table</span>
            </div>
          </div>`;
        });

        // ── Widget overview page ───────────────────────────────────────────────
        const kpiCols        = Math.min(Math.max(kpiItems.length, 1), 4);
        const widgetPageHtml = gridItems.length > 0 ? `<div class="page">
          <div class="table-banner">
            <span class="tit">Dashboard Overview</span>
            <span class="cnt">${esc(printTitle)} &mdash; ${printDate}</span>
          </div>
          ${kpiStripHtml ? `<div class="kpi-summary-row" style="grid-template-columns:repeat(${kpiCols},1fr)">${kpiStripHtml}</div>` : ''}
          ${cardsHtml    ? `<div class="cards-grid">${cardsHtml}</div>` : ''}
          <div class="page-footer">
            <span class="doc-title">${esc(printTitle)}</span>
            <span class="pg">1</span>
          </div>
        </div>` : '';

        // ── Logo ───────────────────────────────────────────────────────────────
        const logoSrc  = document.querySelector('.topbar-logo img')?.src || '';
        const logoHtml = logoSrc ? `<img src="${logoSrc}" crossorigin="anonymous" style="max-height:24px;width:auto" />` : '';

        // ── Assemble HTML document ─────────────────────────────────────────────
        setProg('Building report…', 90);
        const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>${esc(printTitle)} — Report</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#e8eaed;font-family:'Segoe UI',Arial,sans-serif;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:40px}
:root{--blue:#2563eb;--blue-lt:#dbeafe;--blue-dk:#1e40af;--teal:#0d9488;--amber:#d97706;--dark:#111827;--mid:#6b7280;--light:#f3f4f6;--border:#e5e7eb;--white:#fff}
.page{width:595px;min-height:842px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.18);border-radius:3px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.cover-top{background:var(--blue);height:354px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:28px;position:relative;overflow:hidden}
.cover-top::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;border:50px solid rgba(255,255,255,.07);top:-80px;right:-80px}
.cover-top::after{content:'';position:absolute;width:180px;height:180px;border-radius:50%;border:30px solid rgba(255,255,255,.06);bottom:40px;left:-50px}
.cover-logo{background:white;border-radius:10px;padding:10px 20px;margin-bottom:24px;position:relative;z-index:1;font-size:15px;font-weight:700;color:var(--blue);letter-spacing:.02em;display:flex;align-items:center;gap:8px}
.cover-divider{width:50px;height:3px;background:rgba(255,255,255,.4);border-radius:2px;margin-bottom:16px;position:relative;z-index:1}
.cover-title{font-size:26px;font-weight:800;color:#fff;text-align:center;position:relative;z-index:1;padding:0 32px;line-height:1.25}
.cover-subtitle{font-size:11px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.12em;margin-top:8px;position:relative;z-index:1}
.cover-bottom{background:var(--blue-lt);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px}
.cover-meta-row{display:flex;gap:32px}
.cover-meta-item{text-align:center}
.cover-meta-item .val{font-size:22px;font-weight:700;color:var(--blue)}
.cover-meta-item .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mid);margin-top:2px}
.cover-date{font-size:10px;color:var(--mid);margin-top:8px}
.cover-dots{display:flex;gap:8px;margin-top:6px}
.cover-dots span{width:6px;height:6px;border-radius:50%;background:var(--blue)}
.cover-dots span:not(:first-child){opacity:.35}
.section-header{display:flex;align-items:center;padding:0 28px;margin:20px 0 0;position:relative}
.section-header::after{content:'';position:absolute;bottom:-1px;left:28px;right:28px;height:1px;background:var(--border)}
.section-pill{background:var(--blue-dk);color:white;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:4px 4px 0 0;display:flex;align-items:center;gap:6px}
.section-pill .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5)}
.section-date{margin-left:auto;font-size:8px;color:var(--mid)}
.kpi-summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 28px 8px;flex-shrink:0}
.kpi-mini{background:var(--light);border-radius:6px;padding:10px 12px;border-left:3px solid var(--blue)}
.kpi-mini.teal{border-color:var(--teal)}.kpi-mini.indigo{border-color:#4f46e5}.kpi-mini.amber{border-color:#d97706}
.kpi-mini-val{font-size:18px;font-weight:800;color:var(--dark)}
.kpi-mini-lbl{font-size:8px;color:var(--mid);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.kpi-mini-trend{font-size:8px;color:#059669;font-weight:600;margin-top:3px}
.kpi-mini-trend.down{color:#dc2626}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 28px 20px}
.wc{border-radius:6px;overflow:hidden;box-shadow:none;display:flex;flex-direction:column;background:#fff}
.wc-head{display:flex;flex-direction:column;padding:14px 16px 10px;border-bottom:none;flex-shrink:0;background:#fff;position:relative; padding-left:0px !Important;}
.wc-head-title{font-size:14px;color:#000;letter-spacing:.08em;text-transform:uppercase}
.widget-card-body{flex:1;background:#fff;padding:10px;min-height:120px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px}
.wc-body-bottom{display:flex;flex-direction:column;flex:1}
.wc-body-bottom .wc-img{overflow:hidden}
.wc-body-bottom .wc-img img{display:block;width:100%}
.wc-note{padding:10px 14px;font-size:10px;color:#374151;line-height:1.75;border-top:1px solid var(--border);background:#fafafa}
.wc-body-right{display:flex;flex-direction:row;flex:1;min-height:190px}
.wc-body-right .wc-img{flex:0 0 60%;overflow:hidden}
.wc-body-right .wc-img img{display:block;width:100%;height:100%;object-fit:cover}
.wc-aside{flex:1;padding:18px 16px;display:flex;flex-direction:column;justify-content:center;background:#fafafa}
.wc-aside p{font-size:11px;color:#374151;line-height:1.8;margin:0}
.wc-body-left{display:flex;flex-direction:row;flex:1;min-height:190px}
.wc-body-left .wc-img{flex:0 0 60%;overflow:hidden;order:2}
.wc-body-left .wc-img img{display:block;width:100%;height:100%;object-fit:cover}
.wc-body-left .wc-aside{order:1;background:#fafafa}
.kpi-value{font-size:30px;font-weight:800;color:var(--blue)}
.kpi-label{font-size:9px;color:var(--mid);text-transform:uppercase;letter-spacing:.08em}
.kpi-trend{display:flex;align-items:center;gap:3px;font-size:9px;color:#059669;font-weight:600}
.kpi-trend.down{color:#dc2626}
.table-banner{background:var(--blue-dk);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.table-banner .tit{font-size:13px;font-weight:700;color:white;display:flex;align-items:center;gap:8px}
.table-banner .cnt{font-size:8.5px;color:rgba(255,255,255,.65);background:rgba(255,255,255,.15);padding:3px 10px;border-radius:8px}
.data-table-wrap{padding:0 28px 20px;overflow:hidden}
.data-table{width:100%;border-collapse:collapse;font-size:8px}
.data-table thead th{background:var(--blue);color:white;padding:6px 8px;text-align:left;font-weight:600;letter-spacing:.03em}
.data-table tbody tr:nth-child(even) td{background:#f9fafb}
.data-table tbody td{padding:5px 8px;color:var(--dark);border-bottom:1px solid var(--border)}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:7px;font-weight:600}
.badge.green{background:#d1fae5;color:#065f46}.badge.red{background:#fee2e2;color:#991b1b}.badge.amber{background:#fef3c7;color:#92400e}
.page-footer{margin-top:auto;padding:8px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-footer .brand{font-size:7.5px;color:var(--mid);font-weight:600;letter-spacing:.05em}
.page-footer .doc-title{font-size:7px;color:#9ca3af}
.page-footer .pg{font-size:7.5px;color:var(--mid)}
.table-insight{display:flex;align-items:flex-start;gap:10px;margin:14px 28px;padding:12px 14px;border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:4px;background:#fafafa}
.table-insight-text{font-size:9px;color:#374151;line-height:1.75}
.print-bar{background:#1e293b;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;width:100%;position:sticky;top:0;z-index:99}
.print-bar-title{color:rgba(255,255,255,.65);font-size:12px}
.print-btn{background:#2563eb;color:white;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.02em;font-family:inherit}
.print-btn:hover{background:#1d4ed8}
@page{size:A4 portrait;margin:0}
@media print{
  body{background:white;padding:0;gap:0}
  .print-bar{display:none}
  .page{box-shadow:none;border-radius:0;page-break-after:always;break-after:page;width:100%;min-height:100vh}
  .page:last-child{page-break-after:avoid;break-after:avoid}
}
